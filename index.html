<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIGURACION DE SUPABASE - REEMPLAZAR CON TUS CREDENCIALES
// ============================================================
const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
const SUPABASE_KEY = 'TU_CLAVE_ANON_AQUI';
// ============================================================

const USE_SUPABASE = SUPABASE_URL !== 'https://TU_PROYECTO.supabase.co' && SUPABASE_KEY !== 'TU_CLAVE_ANON_AQUI';
let _sb = null;
if(USE_SUPABASE && window.supabase){
  const {createClient} = window.supabase;
  _sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log('[Mboehara] Supabase conectado');
} else {
  console.log('[Mboehara] Modo local (sin Supabase)');
}

// Sistema de almacenamiento unificado
const LS = {
  USERS:'mboehara_users', CURRENT:'mboehara_current', PROGRESS:'mboehara_progress_',
  getUsers(){return JSON.parse(localStorage.getItem(this.USERS)||'{}');},
  saveUsers(u){localStorage.setItem(this.USERS,JSON.stringify(u));},
  getCurrent(){return JSON.parse(localStorage.getItem(this.CURRENT)||'null');},
  setCurrent(u){localStorage.setItem(this.CURRENT,JSON.stringify(u));},
  clearCurrent(){localStorage.removeItem(this.CURRENT);},
  getProgress(uid){return JSON.parse(localStorage.getItem(this.PROGRESS+uid)||'{}');},
  saveProgress(uid,p){localStorage.setItem(this.PROGRESS+uid,JSON.stringify(p));},
};

window.SB = {
  async signUp(email,password,name,country){
    if(_sb){
      const r = await _sb.auth.signUp({email,password,options:{data:{name,country}}});
      if(r.error) return {error:r.error};
      return {data:{user:r.data.user}};
    }
    const users = LS.getUsers();
    if(users[email]) return {error:{message:'already registered'}};
    const refCode = Array(6).fill(0).map(()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
    const user = {id:'u_'+Date.now(),email,password,name,country,refCode,xp:0,streak:1,level:'Principiante'};
    users[email] = user; LS.saveUsers(users); LS.setCurrent(user);
    return {data:{user}};
  },
  async signIn(email,password){
    if(_sb){
      const r = await _sb.auth.signInWithPassword({email,password});
      if(r.error) return {error:r.error};
      return {data:{user:r.data.user}};
    }
    const users = LS.getUsers();
    const u = users[email];
    if(!u || u.password !== password) return {error:{message:'Invalid login credentials'}};
    LS.setCurrent(u);
    return {data:{user:u}};
  },
  async signOut(){
    if(_sb) await _sb.auth.signOut();
    LS.clearCurrent();
    return {};
  },
  async resetPassword(email){
    if(_sb) return await _sb.auth.resetPasswordForEmail(email);
    return {data:{}};
  },
  async getSession(){
    if(_sb){
      const {data} = await _sb.auth.getSession();
      return data.session;
    }
    const u = LS.getCurrent();
    return u ? {user:u} : null;
  },
  async getProfile(userId){
    if(_sb){
      const {data} = await _sb.from('profiles').select('*').eq('id',userId).single();
      return data;
    }
    const u = LS.getCurrent();
    return u ? {name:u.name,country:u.country,xp:u.xp||0,streak:u.streak||1,level:u.level||'Principiante',ref_code:u.refCode||''} : null;
  },
  async saveProgress(userId,lessonId,langId,score,maxScore){
    const xpGained = score*5+10;
    if(_sb){
      await _sb.from('lesson_progress').upsert({user_id:userId,lesson_id:lessonId,lang_id:langId,score,max_score:maxScore,xp_gained:xpGained});
      await _sb.rpc('update_user_xp',{p_user_id:userId,p_xp_gained:xpGained});
      return xpGained;
    }
    const progress = LS.getProgress(userId);
    progress[lessonId] = {score,lang_id:langId};
    LS.saveProgress(userId,progress);
    return xpGained;
  },
  async getProgress(userId){
    if(_sb){
      const {data} = await _sb.from('lesson_progress').select('*').eq('user_id',userId);
      return data || [];
    }
    return Object.entries(LS.getProgress(userId)).map(([lesson_id,v])=>({lesson_id,...v}));
  },
  async submitServiceRequest(serviceId,name,email,message,country){
    if(_sb) return await _sb.from('service_requests').insert({service_id:serviceId,name,email,message,country});
    console.log('[Servicio]',{serviceId,name,email});
    return {data:{}};
  },
  async applyToJob(jobId,userId,name,email,langCert,message){
    if(_sb) return await _sb.from('job_applications').insert({job_id:jobId,user_id:userId,name,email,lang_cert:langCert,message});
    return {data:{}};
  },
  async bookTranslator(translatorId,clientName,clientEmail,message){
    if(_sb) return await _sb.from('translator_bookings').insert({translator_id:translatorId,client_name:clientName,client_email:clientEmail,message});
    return {data:{}};
  },
};
</script>

function AuthModal({onClose,onLogin}){
  const [mode,setMode]=useState("register");
  const [form,setForm]=useState({name:"",email:"",password:"",country:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [forgotSent,setForgotSent]=useState(false);
  const [showForgot,setShowForgot]=useState(false);
  const [forgotEmail,setForgotEmail]=useState("");
  const COUNTRIES=["Argentina","Brasil","Uruguay","Chile","Colombia","México","España","Estados Unidos","Alemania","Israel","Emiratos Árabes Unidos","Italia","Francia","China","Otro"];
  const submit=()=>{
    setErr("");
    if(!form.email||!form.password){setErr("Completá email y contraseña.");return;}
    if(mode==="register"&&!form.name){setErr("Ingresá tu nombre completo.");return;}
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      onLogin({name:form.name||form.email.split("@")[0],email:form.email,country:form.country||"Paraguay",premium:false});
    },900);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300}}>
      <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"28px 24px 44px",width:"100%",maxWidth:480,boxShadow:"0 -8px 40px rgba(0,0,0,0.2)"}}>
        <div style={{width:40,height:4,background:"#e8e2d9",borderRadius:4,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:20,fontWeight:800,color:"#1a1509"}}>
            {mode==="login"?"Bienvenido de vuelta 👋":"Creá tu cuenta gratis 🚀"}
          </div>
          <button onClick={onClose} style={{background:"#f0ebe2",border:"none",borderRadius:10,padding:"6px 12px",cursor:"pointer",color:"#8a7f72",fontSize:14}}>✕</button>
        </div>

        <div style={{display:"flex",background:"#f0ebe2",borderRadius:12,padding:3,marginBottom:18}}>
          {[{k:"register",l:"Registrarse"},{k:"login",l:"Ya tengo cuenta"}].map(t=>(
            <button key={t.k} onClick={()=>{setMode(t.k);setErr("");}}
              style={{flex:1,padding:"10px",border:"none",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700,background:mode===t.k?"#fff":"transparent",color:mode===t.k?"#1a1509":"#8a7f72",boxShadow:mode===t.k?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all 0.2s"}}>
              {t.l}
            </button>
          ))}
        </div>

        {mode==="register"&&(
          <input placeholder="Nombre completo" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
            style={{width:"100%",border:"1.5px solid #e8e2d9",borderRadius:12,padding:"13px 16px",fontSize:14,marginBottom:10,outline:"none"}}/>
        )}
        <input placeholder="Email" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}
          style={{width:"100%",border:"1.5px solid #e8e2d9",borderRadius:12,padding:"13px 16px",fontSize:14,marginBottom:10,outline:"none"}}/>
        <input placeholder="Contraseña" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}
          style={{width:"100%",border:"1.5px solid #e8e2d9",borderRadius:12,padding:"13px 16px",fontSize:14,marginBottom:10,outline:"none"}}/>
        {mode==="register"&&(
          <select value={form.country} onChange={e=>setForm({...form,country:e.target.value})}
            style={{width:"100%",border:"1.5px solid #e8e2d9",borderRadius:12,padding:"13px 16px",fontSize:14,marginBottom:10,outline:"none",background:"#fff",color:form.country?"#1a1509":"#8a7f72"}}>
            <option value="">🌍 ¿Desde qué país venís?</option>
            <option value="Paraguay">🇵🇾 Paraguay</option>
            {COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        )}

        {err&&<div style={{background:"#fde8e8",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#c0392b",marginBottom:10}}>{err}</div>}

        <button onClick={submit} disabled={loading}
          style={{width:"100%",background:"linear-gradient(135deg,#c0392b,#1a3a5c)",color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:12,opacity:loading?0.7:1}}>
          {loading?"⏳ Procesando...":(mode==="register"?"Crear cuenta gratis →":"Entrar →")}
        </button>

        {mode==="register"&&(
          <div style={{background:"#d8f3dc",borderRadius:12,padding:"12px 14px",fontSize:12,color:"#1b4332",lineHeight:1.5}}>
            🎁 Al registrarte: <strong>todos los idiomas desbloqueados</strong> + acceso al Centro de Servicios + código de referido personal
          </div>
        )}
        {mode==="login"&&!showForgot&&(
          <button onClick={()=>setShowForgot(true)} style={{background:"none",border:"none",color:"#8a7f72",fontSize:12,cursor:"pointer",textDecoration:"underline",marginTop:4}}>
            ¿Olvidaste tu contraseña?
          </button>
        )}
        {showForgot&&(
          <div style={{background:"#eff6ff",borderRadius:14,padding:"16px",marginTop:8,border:"1px solid #bfdbfe"}}>
            {!forgotSent?(
              <>
                <div style={{fontSize:13,fontWeight:700,color:"#1a3a5c",marginBottom:10}}>🔑 Recuperar contraseña</div>
                <input placeholder="Tu email registrado" value={forgotEmail} onChange={e=>setForgotEmail(e.target.value)}
                  style={{width:"100%",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"11px 14px",fontSize:13,marginBottom:10,outline:"none"}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowForgot(false)} style={{flex:1,background:"#e2e8f0",border:"none",borderRadius:10,padding:"10px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={()=>{if(forgotEmail)setForgotSent(true);}} style={{flex:2,background:"#1a3a5c",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Enviar →</button>
                </div>
              </>
            ):(
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:28,marginBottom:8}}>📧</div>
                <div style={{fontSize:13,fontWeight:700,color:"#1a3a5c",marginBottom:4}}>¡Email enviado!</div>
                <div style={{fontSize:12,color:"#3b82f6"}}>Revisá tu bandeja de entrada en <strong>{forgotEmail}</strong> para recuperar tu contraseña.</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

      {q:"¿Cuánto tiempo tenés por día?",icon:"⏱️",opts:[{v:"5min",l:"⚡ 5 minutos"},{v:"15min",l:"🎯 15 minutos"},{v:"30min",l:"🔥 30 minutos"},{v:"mas",l:"💪 Más de 30 min"}]},
      {q:"¿Cuál es tu nivel de español?",icon:"📊",opts:[{v:"nativo",l:"🇵🇾 Nativo / Fluido"},{v:"basico",l:"🌱 Básico"},{v:"intermedio",l:"📚 Intermedio"},{v:"cero",l:"❓ No hablo español"}]},
    ];
    const cur=STEPS[onboardStep];
    return(
      <div style={{...base,display:"flex",flexDirection:"column",minHeight:"100vh",paddingBottom:0}}>
        <div style={{background:"linear-gradient(160deg,#c0392b,#1a3a5c)",padding:"40px 24px 32px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,background:"rgba(255,255,255,0.05)",borderRadius:"50%"}}/>
          <div style={{fontSize:12,fontWeight:700,letterSpacing:3,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",marginBottom:8}}>Mbo'ehàra 🇵🇾</div>
          <div style={{fontSize:28,fontWeight:800,color:"#fff",marginBottom:6}}>Bienvenido/a 👋</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.75)"}}>3 preguntas rápidas para personalizar tu experiencia</div>
          <div style={{display:"flex",gap:6,marginTop:16}}>
            {STEPS.map((_,i)=><div key={i} style={{height:4,flex:1,borderRadius:4,background:i<=onboardStep?"#fff":"rgba(255,255,255,0.25)"}}/>)}
          </div>
        </div>
        <div style={{flex:1,padding:"32px 24px"}}>
          <div style={{fontSize:40,marginBottom:16,textAlign:"center"}}>{cur.icon}</div>
          <div style={{fontSize:20,fontWeight:800,color:T.text,marginBottom:24,textAlign:"center",lineHeight:1.3}}>{cur.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {cur.opts.map(opt=>(
              <button key={opt.v} onClick={()=>{
                const key=onboardStep===0?"goal":onboardStep===1?"time":"level";
                const newProfile={...profile,[key]:opt.v};
                setProfile(newProfile);
                if(onboardStep<2){setOnboardStep(s=>s+1);}
                else{setOnboarded(true);setStreak(1);}
              }}
                style={{background:"#fff",border:`2px solid ${T.border}`,borderRadius:14,padding:"16px 20px",cursor:"pointer",fontSize:15,fontWeight:600,color:T.text,textAlign:"left",transition:"all 0.15s"}}>
                {opt.l}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── BOTTOM NAV ─────────────────────────────────────────────────────────────
  const BottomNav=()=>(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:`1px solid ${T.border}`,display:"flex",zIndex:50}}>
      {[{k:"aprender",icon:"📚",label:"Aprender"},{k:"traductor",icon:"🔤",label:"Traductor"},{k:"servicios",icon:"🏢",label:"Servicios"},{k:"perfil",icon:"👤",label:"Mi perfil"}].map(tab=>(
        <button key={tab.k} onClick={()=>{setMainTab(tab.k);setScreen("home");}}
          style={{flex:1,padding:"12px 4px 8px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <span style={{fontSize:18}}>{tab.icon}</span>
          <span style={{fontSize:9,fontWeight:700,color:mainTab===tab.k?"#1a3a5c":T.muted,letterSpacing:0.5}}>{tab.label}</span>
          {mainTab===tab.k&&<div style={{width:20,height:2,background:"#1a3a5c",borderRadius:2}}/>}
        </button>
      ))}
    </div>
  );

  // ── PERFIL / DASHBOARD TAB ─────────────────────────────────────────────────
  if(mainTab==="perfil") return(
    <div style={base}>
      <div style={{background:"linear-gradient(135deg,#1a3a5c,#c0392b)",padding:"36px 24px 28px"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>
            {user?user.name[0].toUpperCase():"👤"}
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{user?user.name:userName||"Estudiante"}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:2}}>{user?.country||"Paraguay"}</div>
            <div style={{fontSize:12,fontWeight:700,color:"#fcd34d",marginTop:4}}>{level} · {totalXp} XP</div>
          </div>
        </div>
      </div>

      <div style={{padding:"20px"}}>
        {/* XP BAR */}
        <div style={{background:"#fff",borderRadius:16,padding:"16px 18px",marginBottom:14,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:levelColor}}>{level}</span>
            <span style={{fontSize:12,color:T.muted}}>{totalXp}/{xpToNext} XP</span>
          </div>
          <div style={{height:10,background:T.light,borderRadius:8,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(100,((totalXp-xpPrev)/(xpToNext-xpPrev))*100)}%`,background:levelColor,borderRadius:8,transition:"width 0.5s"}}/>
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:6}}>Faltan {xpToNext-totalXp} XP para el siguiente nivel</div>
        </div>

        {/* STATS */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {[
            {icon:"🔥",val:streak,label:"Racha días"},
            {icon:"📚",val:Object.keys(done).length,label:"Lecciones"},
            {icon:"⭐",val:totalXp,label:"XP Total"},
          ].map((s,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${T.border}`}}>
              <div style={{fontSize:24}}>{s.icon}</div>
              <div style={{fontSize:22,fontWeight:800,color:T.text,lineHeight:1.1}}>{s.val}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* BADGES */}
        <div style={{background:"#fff",borderRadius:16,padding:"16px 18px",marginBottom:14,border:`1px solid ${T.border}`}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:12}}>🏅 Logros</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {BADGES.map(b=>{
              const earned=badges.includes(b.id)||(b.id==="first"&&Object.keys(done).length>0);
              return(
                <div key={b.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,opacity:earned?1:0.3,width:56}}>
                  <div style={{width:44,height:44,borderRadius:12,background:earned?"#fff9e6":T.light,border:`2px solid ${earned?"#f59e0b":T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{b.icon}</div>
                  <div style={{fontSize:9,color:earned?T.text:T.muted,textAlign:"center",lineHeight:1.2}}>{b.label}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* PROGRESS PER LANG */}
        <div style={{background:"#fff",borderRadius:16,padding:"16px 18px",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:12}}>📊 Progreso por idioma</div>
          {Object.values(LANGS).map(l=>{
            const prog=getLangProgress(l);
            const pct=Math.round((prog.done/prog.total)*100);
            return(
              <div key={l.id} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600,color:T.text}}>{l.emoji} {l.name}</span>
                  <span style={{fontSize:12,color:T.muted}}>{prog.done}/{prog.total}</span>
                </div>
                <div style={{height:6,background:T.light,borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:l.accent,borderRadius:4,transition:"width 0.5s"}}/>
                </div>
              </div>
            );
          })}
        </div>

        {!user&&(
          <button onClick={()=>setShowAuth(true)} style={{width:"100%",background:"linear-gradient(135deg,#c0392b,#1a3a5c)",color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:14}}>
            Crear cuenta para guardar tu progreso →
          </button>
        )}
      </div>
      <BottomNav/>
    </div>
  );

  // TRADUCTOR TAB
  if(mainTab==="traductor") return <div style={base}><Translator/><BottomNav/></div>;

  // SERVICIOS TAB
  if(mainTab==="servicios") return <div style={base}><ServicesSection/><BottomNav/></div>;

  // LESSON SCREEN
  if(screen==="lesson"&&lesson&&lang){
    const cv=isVocab?lesson.vocab[step]:null;
    const cq=!isVocab?lesson.quiz[quizIdx]:null;
    return(
      <div style={{...base,display:"flex",flexDirection:"column",minHeight:"100vh",paddingBottom:0}}>
        <div style={{padding:"16px 20px 0",display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setScreen("language")} style={{background:T.light,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,color:T.text}}>✕</button>
          <div style={{flex:1,height:8,background:T.light,borderRadius:8,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:lang.accent,borderRadius:8,transition:"width 0.4s"}}/>
          </div>
          <span style={{fontSize:12,fontWeight:600,color:T.muted}}>{step+1}/{total}</span>
        </div>
        {isVocab&&cv&&(
          <div style={{flex:1,padding:"28px 24px",display:"flex",flexDirection:"column"}}>
            {useEffect(()=>{const t=setTimeout(()=>speak(cv.w,lang.id),400);return()=>clearTimeout(t);},[step])&&null}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:lang.accent,textTransform:"uppercase",marginBottom:20}}>Vocabulario</div>
            <div style={{flex:1,background:"#fff",borderRadius:24,padding:"32px 24px",boxShadow:"0 4px 24px rgba(0,0,0,0.08)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center",border:"2px solid #e8e2d9"}}>
              <div style={{fontSize:(lang.id==="espanol"||lang.id==="frances")?22:34,fontWeight:800,color:lang.color,lineHeight:1.2,marginBottom:14}}>{cv.w}</div>
              <button onClick={()=>speak(cv.w,lang.id)}
                style={{background:lang.bg,border:`2px solid ${lang.accent}`,borderRadius:50,width:52,height:52,cursor:"pointer",fontSize:22,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                🔊
              </button>
              <div style={{fontSize:18,fontWeight:600,color:T.text,marginBottom:12}}>{cv.t}</div>
              <div style={{height:1,background:T.border,width:"60%",marginBottom:12}}/>
              <div style={{fontSize:13,color:T.muted,fontStyle:"italic",lineHeight:1.6}}>"{cv.ex}"</div>
              <button onClick={()=>speak(cv.ex,lang.id)}
                style={{marginTop:12,background:"transparent",border:`1px solid ${T.border}`,borderRadius:20,padding:"6px 16px",cursor:"pointer",fontSize:12,color:T.muted,display:"flex",alignItems:"center",gap:6}}>
                🔊 <span>Escuchar ejemplo</span>
              </button>
            </div>
            <button onClick={next} style={{marginTop:20,background:lang.color,color:"#fff",border:"none",borderRadius:16,padding:"17px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {step+1<vocabLen?"Siguiente →":"¡Al quiz! →"}
            </button>
          </div>
        )}
        {!isVocab&&cq&&(
          <div style={{flex:1,padding:"24px",display:"flex",flexDirection:"column"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:lang.accent,textTransform:"uppercase",marginBottom:14}}>Pregunta {quizIdx+1}/{quizLen}</div>
            <div style={{background:"#fff",borderRadius:18,padding:"18px",marginBottom:18,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:`1px solid ${T.border}`}}>
              <div style={{fontSize:16,fontWeight:700,color:T.text,lineHeight:1.5}}>{cq.q}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,flex:1}}>
              {cq.opts.map((opt,i)=>{
                let bg="#fff",border=T.border,col=T.text,fw=500;
                if(confirmed){if(i===cq.ans){bg="#d4edda";border=T.success;col=T.success;fw=700;}else if(i===sel){bg="#fde8e8";border=T.error;col=T.error;}}
                else if(sel===i){bg=lang.bg;border=lang.accent;}
                return(
                  <button key={i} onClick={()=>handleAnswer(i)}
                    style={{background:bg,border:`2px solid ${border}`,borderRadius:14,padding:"12px 14px",cursor:confirmed?"default":"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",transition:"all 0.15s"}}>
                    <div style={{width:26,height:26,borderRadius:8,background:confirmed&&i===cq.ans?T.success:(confirmed&&i===sel?T.error:lang.color),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{OPTS[i]}</div>
                    <span style={{fontSize:14,fontWeight:fw,color:col}}>{opt}</span>
                  </button>
                );
              })}
            </div>
            {confirmed&&(
              <div style={{marginTop:14}}>
                <div style={{background:sel===cq.ans?"#d4edda":"#fde8e8",borderRadius:12,padding:"12px 16px",marginBottom:12,fontSize:14,fontWeight:600,color:sel===cq.ans?T.success:T.error}}>
                  {sel===cq.ans?"✅ ¡Correcto!":`❌ Correcto: ${cq.opts[cq.ans]}`}
                </div>
                <button onClick={next} style={{width:"100%",background:lang.color,color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                  {step+1>=total?"Ver resultado →":"Siguiente →"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // COMPLETE SCREEN
  if(screen==="complete"&&lesson&&lang){
    const fs=done[lesson.id]??score;
    const pctS=Math.round((fs/quizLen)*100);
    const stars=pctS>=90?3:pctS>=60?2:1;
    const allFlat=lang.units.flatMap(u=>u.lessons);
    const nextLes=allFlat[allFlat.findIndex(l=>l.id===lesson.id)+1]||null;
    const langComplete=isLangComplete(lang);
    return(
      <div style={{...base,display:"flex",flexDirection:"column",alignItems:"center",padding:"44px 24px"}}>
        {showCert&&<CertModal lang={lang} name={userName} onClose={()=>setShowCert(false)}/>}
        <div style={{fontSize:60,marginBottom:10}}>{stars===3?"🏆":stars===2?"🎉":"💪"}</div>
        <div style={{fontSize:24,fontWeight:800,color:T.text,marginBottom:6}}>¡Lección completada!</div>
        <div style={{fontSize:14,color:T.muted,marginBottom:22}}>{lesson.title} · {lang.name}</div>
        <div style={{background:"#fff",borderRadius:22,padding:"22px 28px",width:"100%",marginBottom:14,boxShadow:"0 4px 20px rgba(0,0,0,0.08)",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:26,marginBottom:10}}>{"⭐".repeat(stars)}</div>
          <div style={{fontSize:40,fontWeight:800,color:lang.color}}>{fs}/{quizLen}</div>
          <div style={{marginTop:10,height:8,background:T.light,borderRadius:8,overflow:"hidden"}}><div style={{height:"100%",width:`${pctS}%`,background:pctS>=60?T.success:T.error,borderRadius:8}}/></div>
          <div style={{marginTop:12,padding:"10px",background:"#fff9e6",borderRadius:12,fontSize:13,fontWeight:600,color:"#b07800"}}>+{stars*10} XP ✨</div>
        </div>
        {langComplete&&(
          <div style={{width:"100%",background:"linear-gradient(135deg,#d4edda,#b7dfc4)",borderRadius:16,padding:"16px",marginBottom:12,textAlign:"left"}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1b4332",marginBottom:8}}>🎉 ¡Completaste {lang.name}!</div>
            <input placeholder="Tu nombre para el certificado..." value={userName} onChange={e=>setUserName(e.target.value)}
              style={{width:"100%",border:"1.5px solid #52b788",borderRadius:10,padding:"9px 12px",fontSize:13,marginBottom:8,outline:"none"}}/>
            <button onClick={()=>setShowCert(true)} style={{width:"100%",background:"#1b4332",color:"#fff",border:"none",borderRadius:12,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>🏅 Obtener Certificado</button>
          </div>
        )}
        <AdBanner idx={adIdx}/>
        {nextLes&&<button onClick={()=>startLesson(lang,nextLes)} style={{width:"100%",background:lang.color,color:"#fff",border:"none",borderRadius:16,padding:"17px",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:10}}>Siguiente: {nextLes.title} →</button>}
        <button onClick={()=>setScreen("language")} style={{width:"100%",background:"transparent",color:T.muted,border:`1.5px solid ${T.border}`,borderRadius:16,padding:"15px",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:8}}>Ver todas las lecciones</button>
        <BottomNav/>
      </div>
    );
  }

  // LANGUAGE SCREEN
  if(screen==="language"&&lang){
    const allFlat=lang.units.flatMap(u=>u.lessons);
    const doneCount=allFlat.filter(l=>done[l.id]!==undefined).length;
    const isLocked=(ui,li)=>{if(ui===0&&li===0)return false;if(li===0){return lang.units[ui-1].lessons.some(l=>done[l.id]===undefined);}return done[lang.units[ui].lessons[li-1].id]===undefined;};
    return(
      <div style={base}>
        {showCert&&<CertModal lang={lang} name={userName} onClose={()=>setShowCert(false)}/>}
        <div style={{background:lang.color,padding:"20px 20px 24px"}}>
          <button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:13,marginBottom:16}}>← Inicio</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:50,height:50,borderRadius:14,background:lang.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{lang.emoji}</div>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:22,fontWeight:800,color:"#fff"}}>{lang.name}</span>
                {lang.premium&&<span style={{background:"#f97316",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>PREMIUM</span>}
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.7)"}}>{doneCount}/{allFlat.length} lecciones</div>
            </div>
          </div>
        </div>
        {isLangComplete(lang)&&(
          <div style={{margin:"16px 20px 0",background:"linear-gradient(135deg,#d4edda,#b7dfc4)",borderRadius:16,padding:"14px 16px"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1b4332",marginBottom:8}}>🎉 ¡Completaste {lang.name}!</div>
            <input placeholder="Tu nombre..." value={userName} onChange={e=>setUserName(e.target.value)} style={{width:"100%",border:"1.5px solid #52b788",borderRadius:10,padding:"9px 12px",fontSize:13,marginBottom:8,outline:"none"}}/>
            <button onClick={()=>setShowCert(true)} style={{width:"100%",background:"#1b4332",color:"#fff",border:"none",borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>🏅 Obtener Certificado</button>
          </div>
        )}
        <div style={{padding:"16px 20px 32px"}}>
          {lang.units.map((unit,ui)=>(
            <div key={ui} style={{marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{height:1,flex:1,background:T.border}}/>
                <span style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:1,textTransform:"uppercase"}}>Unidad {ui+1} · {unit.title}</span>
                <div style={{height:1,flex:1,background:T.border}}/>
              </div>
              {unit.lessons.map((les,li)=>{
                const isDone=done[les.id]!==undefined;
                const locked=isLocked(ui,li);
                const lesNum=lang.units.slice(0,ui).reduce((a,u)=>a+u.lessons.length,0)+li+1;
                return(
                  <div key={les.id} onClick={()=>!locked&&startLesson(lang,les)}
                    style={{background:"#fff",border:`1.5px solid ${isDone?lang.accent:T.border}`,borderRadius:14,padding:"13px 16px",marginBottom:10,cursor:locked?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:12,opacity:locked?0.45:1}}>
                    <div style={{width:40,height:40,borderRadius:12,background:isDone?lang.bg:T.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{locked?"🔒":les.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,color:T.text}}>Lección {lesNum}: {les.title}</div>
                      <div style={{fontSize:11,color:T.muted,marginTop:2}}>{les.vocab.length} palabras · {les.quiz.length} preguntas</div>
                    </div>
                    {isDone&&<span style={{background:lang.accent,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>✓ {done[les.id]}/{les.quiz.length}</span>}
                    {!isDone&&!locked&&<span style={{fontSize:18,color:T.muted}}>›</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <BottomNav/>
      </div>
    );
  }

  // HOME SCREEN
  return(
    <div style={base}>
      {showCert&&lang&&<CertModal lang={lang} name={userName} onClose={()=>setShowCert(false)}/>}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onLogin={u=>{setUser(u);setUserName(u.name);setShowAuth(false);}}/>}
      {showPrivacy&&<PrivacyPolicy onClose={()=>setShowPrivacy(false)}/>}
      <div style={{background:"linear-gradient(160deg,#c0392b 0%,#1a3a5c 100%)",padding:"44px 24px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-50,right:-50,width:180,height:180,background:"rgba(255,255,255,0.05)",borderRadius:"50%"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative"}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:3,color:"rgba(255,255,255,0.6)",marginBottom:8,textTransform:"uppercase"}}>Paraguay 🇵🇾</div>
            <div style={{fontSize:34,fontWeight:800,color:"#fff",lineHeight:1.1,marginBottom:6}}>Mbo'ehàra</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.8)",fontWeight:500}}>Del Paraguay al mundo.</div>
          </div>
          {user?(
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"8px 14px",textAlign:"right"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{user.name.split(" ")[0]}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.65)"}}>{user.country}</div>
              <button onClick={()=>setUser(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:10,cursor:"pointer",marginTop:2}}>Salir</button>
            </div>
          ):(
            <button onClick={()=>setShowAuth(true)}
              style={{background:"rgba(255,255,255,0.2)",border:"1.5px solid rgba(255,255,255,0.4)",borderRadius:12,padding:"10px 16px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>
              Entrar / Registro
            </button>
          )}
        </div>
      </div>

      <div style={{margin:"20px 20px 0",background:"linear-gradient(135deg,#1a3a5c,#c0392b)",borderRadius:16,padding:"14px 16px"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:"rgba(255,255,255,0.65)",textTransform:"uppercase",marginBottom:6}}>🎁 Tu código de referido</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 14px",fontSize:20,fontWeight:800,color:"#fff",letterSpacing:3}}>{refCode}</div>
          <button onClick={copyRef} style={{background:copiedRef?"#2a7d46":"rgba(255,255,255,0.2)",border:"none",borderRadius:10,padding:"10px 14px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff",transition:"background 0.2s"}}>
            {copiedRef?"✓ Copiado":"Compartir"}
          </button>
        </div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:8}}>Compartís → tu amigo desbloquea inglés gratis → vos ganás XP 🔥</div>
      </div>

      <div style={{padding:"20px 20px 0"}}>
        <div style={{fontSize:12,fontWeight:700,color:T.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Elegí tu idioma</div>

        {lastLesson&&(
          <div onClick={()=>startLesson(lastLesson.lang,lastLesson.les)}
            style={{background:`linear-gradient(135deg,${lastLesson.lang.color},${lastLesson.lang.color}cc)`,borderRadius:16,padding:"16px 18px",marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:48,height:48,borderRadius:14,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{lastLesson.les.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1,color:"rgba(255,255,255,0.65)",textTransform:"uppercase",marginBottom:3}}>▶ Continuar donde dejaste</div>
              <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{lastLesson.les.title}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.75)"}}>{lastLesson.lang.name}</div>
            </div>
            <div style={{fontSize:22,color:"rgba(255,255,255,0.7)"}}>›</div>
          </div>
        )}
        {Object.values(LANGS).map(l=>{
          const prog=getLangProgress(l);
          return(
            <div key={l.id} onClick={()=>{setLang(l);setScreen("language");}}
              style={{background:"#fff",border:`1px solid ${l.premium?"#f97316":T.border}`,borderRadius:16,padding:"14px 16px",marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",gap:14,boxShadow:l.premium?"0 2px 12px rgba(249,115,22,0.15)":"0 2px 8px rgba(0,0,0,0.05)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:l.accent,borderRadius:"16px 0 0 16px"}}/>
              <div style={{width:48,height:48,borderRadius:14,background:l.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{l.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:700,fontSize:15,color:T.text}}>{l.name}</span>
                  {l.premium&&<span style={{background:"#f97316",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>PREMIUM</span>}
                  {isLangComplete(l)&&<span style={{background:"#2a7d46",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>✓</span>}
                </div>
                <div style={{fontSize:12,color:T.muted,marginTop:2}}>{l.tagline}</div>
                <div style={{marginTop:8,height:4,background:T.light,borderRadius:4}}><div style={{height:"100%",width:`${(prog.done/prog.total)*100}%`,background:l.accent,borderRadius:4,transition:"width 0.6s"}}/></div>
                <div style={{fontSize:11,color:T.muted,marginTop:3}}>{prog.done}/{prog.total} lecciones</div>
              </div>
              <div style={{fontSize:18,color:T.muted}}>›</div>
            </div>
          );
        })}
        <AdBanner idx={0}/>
        <AdBanner idx={3}/>
      </div>

      <div style={{padding:"8px 20px 16px",textAlign:"center"}}>
        <div style={{fontSize:12,color:T.muted,background:T.light,borderRadius:20,padding:"8px 20px",display:"inline-block",marginBottom:10}}>✨ Gratis · Sin registro · Para todos</div>
        <div style={{display:"flex",justifyContent:"center",gap:16}}>
          <button onClick={()=>setShowPrivacy(true)} style={{background:"none",border:"none",fontSize:11,color:T.muted,cursor:"pointer",textDecoration:"underline"}}>🔒 Política de Privacidad</button>
          <button onClick={()=>setShowPrivacy(true)} style={{background:"none",border:"none",fontSize:11,color:T.muted,cursor:"pointer",textDecoration:"underline"}}>Términos de Uso</button>
        </div>
      </div>
      <BottomNav/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
